apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: reviews.vinculum.dev
spec:
  group: vinculum.dev
  scope: Namespaced
  names:
    plural: reviews
    singular: review
    kind: Review
    shortNames: [rev]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Task
          type: string
          jsonPath: .spec.taskRef
        - name: Verdict
          type: string
          jsonPath: .spec.verdict
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                requirementRef: {type: string}
                requirementFilePath: {type: string}
                taskRef: {type: string}
                repositoryRef: {type: string}
                reviewerDroneRef: {type: string}
                pullRequestUrl: {type: string}
                automated: {type: boolean}
                verdict: {type: string}
                summary: {type: string}
                findings:
                  type: array
                  items:
                    type: object
                    properties:
                      category: {type: string}
                      path: {type: string}
                      message: {type: string}
            status:
              type: object
              properties:
                phase: {type: string}
                jobName: {type: string}
                reviewerDrone: {type: string}
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}

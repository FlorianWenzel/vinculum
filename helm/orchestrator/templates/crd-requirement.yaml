apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: requirements.vinculum.dev
spec:
  group: vinculum.dev
  scope: Namespaced
  names:
    plural: requirements
    singular: requirement
    kind: Requirement
    shortNames: [req]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Repository
          type: string
          jsonPath: .spec.repositoryRef
        - name: File
          type: string
          jsonPath: .spec.filePath
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Status
          type: string
          jsonPath: .status.observedStatus
        - name: Tasks
          type: string
          jsonPath: .status.taskRefs
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                repositoryRef: {type: string}
                filePath: {type: string}
            status:
              type: object
              properties:
                phase: {type: string}
                observedRevision: {type: string}
                contentChecksum: {type: string}
                observedTitle: {type: string}
                observedSlug: {type: string}
                observedStatus: {type: string}
                observedBranch: {type: string}
                observedDependsOn:
                  type: array
                  items: {type: string}
                taskRefs:
                  type: array
                  items: {type: string}
                pullRequestUrl: {type: string}
                pullRequestNumber: {type: integer}
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tasks.vinculum.dev
spec:
  group: vinculum.dev
  scope: Namespaced
  names:
    plural: tasks
    singular: task
    kind: Task
    shortNames: [task]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Drone
          type: string
          jsonPath: .status.assignedDrone
        - name: Job
          type: string
          jsonPath: .status.jobName
        - name: Repository
          type: string
          jsonPath: .spec.repositoryRef
        - name: Started
          type: date
          jsonPath: .status.startedAt
        - name: Finished
          type: date
          jsonPath: .status.finishedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [repositoryRef, prompt]
              properties:
                requirementRef: {type: string}
                requirementFilePath: {type: string}
                droneRef: {type: string}
                role: {type: string}
                repositoryRef: {type: string}
                repoUrl: {type: string}
                baseBranch: {type: string}
                workingBranch: {type: string}
                workspacePath: {type: string}
                startupContractVersion: {type: string}
                dependsOn:
                  type: array
                  items: {type: string}
                prompt: {type: string}
                instructions: {type: boolean}
            status:
              type: object
              properties:
                phase: {type: string}
                assignedDrone: {type: string}
                jobName: {type: string}
                verificationPhase: {type: string}
                verificationJobName: {type: string}
                verificationDrone: {type: string}
                reviewRef: {type: string}
                pullRequestUrl: {type: string}
                pullRequestNumber: {type: integer}
                branch: {type: string}
                summary: {type: string}
                startedAt:
                  type: string
                  format: date-time
                finishedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}

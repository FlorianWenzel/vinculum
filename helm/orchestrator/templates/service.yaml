apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-orchestrator
spec:
  selector:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: api
      port: 8084
      targetPort: api
    - name: probes
      port: 8083
      targetPort: probes

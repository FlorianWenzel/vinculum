apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dronerepositoryaccesses.vinculum.dev
spec:
  group: vinculum.dev
  scope: Namespaced
  names:
    plural: dronerepositoryaccesses
    singular: dronerepositoryaccess
    kind: DroneRepositoryAccess
    shortNames: [dra]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Drone
          type: string
          jsonPath: .spec.droneRef
        - name: Repository
          type: string
          jsonPath: .spec.repositoryRef
        - name: Permission
          type: string
          jsonPath: .spec.permission
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                droneRef: {type: string}
                repositoryRef: {type: string}
                permission: {type: string}
            status:
              type: object
              properties:
                phase: {type: string}
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}

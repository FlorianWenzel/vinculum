infrastructure:
  enabled: true

orchestrator:
  enabled: true

vinculumInfra:
  replicaCount: 1
  image:
    repository: ghcr.io/florianwenzel/vinculum-infra
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  resources: {}
  env:
    serverAddr: :8081
    autoBootstrap: true
    keycloakBaseURL: ""
    keycloakIssuerURL: ""
    keycloakAdminRealm: master
    keycloakRealm: vinculum
    keycloakForgejoClientID: forgejo
    keycloakForgejoRedirectURIs: ""
    keycloakForgejoWebOrigins: ""
    forgejoBaseURL: ""
    forgejoPublicURL: ""
    forgejoOrgName: vinculum
    forgejoOrgVisibility: private
    forgejoAuthSourceName: Vinculum
    forgejoPodNamespace: ""
    forgejoPodLabelSelector: ""
  secrets:
    keycloakAdminUsername: admin
    keycloakAdminPassword: admin
    forgejoAdminUsername: vinculum
    forgejoAdminPassword: vinculum

hiveUI:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/florianwenzel/vinculum-hive-ui
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: vinculum.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

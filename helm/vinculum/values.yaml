infrastructure:
  enabled: true

orchestrator:
  enabled: true

vinculumInfra:
  replicaCount: 1
  image:
    repository: ghcr.io/florianwenzel/vinculum-infra
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  resources: {}
  env:
    serverAddr: :8081
    autoBootstrap: true
    keycloakBaseURL: ""
    keycloakIssuerURL: ""
    keycloakAdminRealm: master
    keycloakRealm: vinculum
    keycloakForgejoClientID: forgejo
    keycloakForgejoRedirectURIs: ""
    keycloakForgejoWebOrigins: ""
    keycloakHiveUIClientID: hive-ui
    keycloakHiveUIRedirectURIs: ""
    keycloakHiveUIWebOrigins: ""
    forgejoBaseURL: ""
    forgejoPublicURL: ""
    forgejoOrgName: vinculum
    forgejoOrgVisibility: private
    forgejoAuthSourceName: Vinculum
    forgejoPodNamespace: ""
    forgejoPodLabelSelector: ""
  secrets:
    keycloakAdminUsername: admin
    keycloakAdminPassword: admin
    forgejoAdminUsername: hive_queen
    forgejoAdminPassword: hive_queen

hiveUI:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/florianwenzel/vinculum-hive-ui
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  auth:
    enabled: false
    publicURL: ""
    cookieSecret: ""
    clientSecret: ""
    oauth2Proxy:
      image:
        repository: quay.io/oauth2-proxy/oauth2-proxy
        tag: v7.8.1
        pullPolicy: IfNotPresent
      cookieSecure: true
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: vinculum.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

website:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/florianwenzel/vinculum-site
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: vincula.dev
        paths:
          - path: /
            pathType: Prefix
    tls: []

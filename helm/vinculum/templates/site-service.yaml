{{- if .Values.website.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vinculum.site.name" . }}
  labels:
    {{- include "vinculum.labels" . | nindent 4 }}
    app.kubernetes.io/component: website
spec:
  type: {{ .Values.website.service.type }}
  ports:
    - port: {{ .Values.website.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "vinculum.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: website
{{- end }}

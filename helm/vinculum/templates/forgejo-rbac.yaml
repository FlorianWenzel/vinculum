apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-forgejo-exec" (include "vinculum.infra.name" .) | quote }}
  namespace: {{ include "vinculum.forgejoPodNamespace" . | quote }}
  labels:
    helm.sh/chart: {{ include "vinculum.chart" . }}
    app.kubernetes.io/name: {{ include "vinculum.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-forgejo-exec" (include "vinculum.infra.name" .) | quote }}
  namespace: {{ include "vinculum.forgejoPodNamespace" . | quote }}
  labels:
    helm.sh/chart: {{ include "vinculum.chart" . }}
    app.kubernetes.io/name: {{ include "vinculum.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vinculum.infra.name" . | quote }}
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-forgejo-exec" (include "vinculum.infra.name" .) | quote }}

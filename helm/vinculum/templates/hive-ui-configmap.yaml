{{- if .Values.hiveUI.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vinculum.ui.name" . }}-nginx
  labels:
    {{- include "vinculum.labels" . | nindent 4 }}
    app.kubernetes.io/component: hive-ui
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://{{ .Release.Name }}-orchestrator.{{ .Release.Namespace }}.svc.cluster.local:8084;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
{{- end }}

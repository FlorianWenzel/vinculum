{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-hive-ui-auth" (include "vinculum.ui.name" .)) -}}
{{- $cookieSecret := .Values.hiveUI.auth.cookieSecret -}}
{{- $clientSecret := .Values.hiveUI.auth.clientSecret -}}
{{- if and (eq $cookieSecret "") $existing -}}
{{- $cookieSecret = index $existing.data "cookie-secret" | b64dec -}}
{{- end -}}
{{- if and (eq $clientSecret "") $existing -}}
{{- $clientSecret = index $existing.data "client-secret" | b64dec -}}
{{- end -}}
{{- if eq $cookieSecret "" -}}
{{- $cookieSecret = randAlphaNum 32 -}}
{{- end -}}
{{- if eq $clientSecret "" -}}
{{- $clientSecret = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vinculum.infra.name" . }}
  labels:
    helm.sh/chart: {{ include "vinculum.chart" . }}
    app.kubernetes.io/name: {{ include "vinculum.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  KEYCLOAK_ADMIN_USERNAME: {{ .Values.vinculumInfra.secrets.keycloakAdminUsername | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.vinculumInfra.secrets.keycloakAdminPassword | quote }}
  FORGEJO_ADMIN_USERNAME: {{ .Values.vinculumInfra.secrets.forgejoAdminUsername | quote }}
  FORGEJO_ADMIN_PASSWORD: {{ .Values.vinculumInfra.secrets.forgejoAdminPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vinculum.ui.name" . }}-auth
  labels:
    helm.sh/chart: {{ include "vinculum.chart" . }}
    app.kubernetes.io/name: {{ include "vinculum.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  cookie-secret: {{ $cookieSecret | quote }}
  client-secret: {{ $clientSecret | quote }}

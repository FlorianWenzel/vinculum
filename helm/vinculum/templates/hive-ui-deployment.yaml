{{- if .Values.hiveUI.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vinculum.ui.name" . }}
  labels:
    {{- include "vinculum.labels" . | nindent 4 }}
    app.kubernetes.io/component: hive-ui
spec:
  replicas: {{ .Values.hiveUI.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vinculum.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: hive-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vinculum.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: hive-ui
    spec:
      containers:
        - name: hive-ui
          image: "{{ .Values.hiveUI.image.repository }}:{{ default .Chart.AppVersion .Values.hiveUI.image.tag }}"
          imagePullPolicy: {{ .Values.hiveUI.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "vinculum.ui.name" . }}-nginx
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: vinculum-keycloak-theme
  labels:
    app.kubernetes.io/name: vinculum-keycloak-theme
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  theme.properties: |
    parent=keycloak.v2
    import=common/keycloak
    styles=css/vinculum.css
  messages_en.properties: |
    loginTitle=Vinculum Collective
    loginTitleHtml=<span>Vinculum Collective</span>
    doLogIn=Assimilate
    username=Designation
    password=Access Sequence
  vinculum.css: |
    :root {
      --vinculum-bg: #070a08;
      --vinculum-bg-deep: #0f1411;
      --vinculum-panel: rgba(23, 29, 25, 0.88);
      --vinculum-panel-edge: rgba(125, 145, 132, 0.22);
      --vinculum-grid: rgba(132, 156, 140, 0.08);
      --vinculum-green: #7cff5c;
      --vinculum-green-soft: #56d73f;
      --vinculum-green-dim: #2d7d22;
      --vinculum-metal: #a2aba4;
      --vinculum-metal-dark: #5e6861;
      --vinculum-text: #eef5ef;
      --vinculum-text-soft: #a3b3a7;
      --vinculum-danger: #d2ff72;
      --vinculum-shadow: 0 26px 90px rgba(0, 0, 0, 0.65);
      --pf-v5-global--primary-color--100: var(--vinculum-green);
      --pf-v5-global--primary-color--200: #9cff79;
      --pf-v5-global--BackgroundColor--100: transparent;
      --pf-v5-global--Color--100: var(--vinculum-text);
      --pf-v5-global--Color--200: var(--vinculum-text-soft);
      --pf-v5-global--link--Color: var(--vinculum-green);
      --pf-v5-global--link--Color--hover: #bdff8f;
      --pf-v5-c-button--m-primary--BackgroundColor: linear-gradient(90deg, #2c3d30 0%, #4f6452 22%, #7cff5c 62%, #b7ff8e 100%);
      --pf-v5-c-button--m-primary--Color: #071008;
      --pf-v5-c-button--m-primary--hover--BackgroundColor: #9cff79;
    }

    body,
    .login-pf,
    .pf-v5-c-background-image,
    .pf-v5-c-login,
    .pf-v5-c-login__container,
    .pf-v5-c-login__main {
      background:
        radial-gradient(circle at 70% 32%, rgba(124, 255, 92, 0.22), transparent 0 18%),
        radial-gradient(circle at 22% 78%, rgba(124, 255, 92, 0.12), transparent 0 20%),
        linear-gradient(rgba(132, 156, 140, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(132, 156, 140, 0.05) 1px, transparent 1px),
        linear-gradient(145deg, rgba(7, 10, 8, 0.98), rgba(14, 18, 15, 0.98));
      background-size: auto, auto, 48px 48px, 48px 48px, auto;
      color: var(--vinculum-text);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      letter-spacing: 0.03em;
    }

    #kc-header-wrapper,
    .pf-v5-c-login__main-header h1,
    #kc-page-title {
      color: #dbe7dd;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(124, 255, 92, 0.22);
    }

    #kc-header-wrapper {
      position: relative;
      padding-top: 8.25rem;
      text-align: center;
    }

    #kc-header-wrapper::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 132px;
      height: 132px;
      transform: translateX(-50%);
      background: url('../img/logo.png') center/contain no-repeat;
      filter: drop-shadow(0 0 24px rgba(124, 255, 92, 0.38));
    }

    #kc-header-wrapper::after {
      content: "Resistance is futile";
      display: block;
      margin-top: 0.75rem;
      color: var(--vinculum-green);
      font-size: 0.72rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .pf-v5-c-login__main,
    .card-pf,
    .kcFormCardClass {
      position: relative;
      border: 1px solid var(--vinculum-panel-edge);
      border-radius: 24px;
      box-shadow: var(--vinculum-shadow);
      backdrop-filter: blur(12px);
      background:
        linear-gradient(180deg, rgba(31, 37, 33, 0.95), rgba(15, 20, 17, 0.96)),
        url('../img/circuit-placeholder.svg') center/cover no-repeat;
      overflow: hidden;
    }

    .pf-v5-c-login__main::before,
    .card-pf::before,
    .kcFormCardClass::before {
      content: "";
      display: block;
      height: 10px;
      background: linear-gradient(90deg, #232b25 0%, #5c6b60 30%, #7cff5c 58%, #cbff99 100%);
      box-shadow: 0 0 18px rgba(124, 255, 92, 0.22);
    }

    .pf-v5-c-login__main::after,
    .card-pf::after,
    .kcFormCardClass::after {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(124, 255, 92, 0.08);
      border-radius: 18px;
      pointer-events: none;
    }

    .pf-v5-c-form-control,
    input[type="text"],
    input[type="password"] {
      background: rgba(11, 16, 13, 0.94);
      border: 1px solid rgba(94, 104, 97, 0.7);
      border-radius: 12px;
      color: var(--vinculum-text);
      box-shadow: inset 0 0 0 1px rgba(124, 255, 92, 0.04);
    }

    .pf-v5-c-form-control:focus,
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: rgba(124, 255, 92, 0.75);
      box-shadow: 0 0 0 1px rgba(124, 255, 92, 0.35), 0 0 24px rgba(124, 255, 92, 0.08);
    }

    label,
    .pf-v5-c-form__label-text {
      color: var(--vinculum-metal);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.72rem;
    }

    .pf-v5-c-button.pf-m-primary,
    input[type="submit"] {
      border: 1px solid rgba(198, 255, 154, 0.2);
      border-radius: 999px;
      box-shadow: 0 14px 30px rgba(124, 255, 92, 0.16);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .pf-v5-c-button.pf-m-primary:hover,
    input[type="submit"]:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .pf-v5-c-login__main-footer,
    .login-pf-page .login-pf-signup,
    #kc-info,
    #kc-form-options,
    .pf-v5-c-helper-text {
      color: var(--vinculum-text-soft);
    }

    a {
      text-decoration: none;
    }

    @media (max-width: 640px) {
      #kc-header-wrapper {
        padding-top: 6.8rem;
      }

      #kc-header-wrapper::before {
        width: 104px;
        height: 104px;
      }
    }

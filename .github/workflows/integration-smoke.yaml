name: Integration Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/orchestrator/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/hive-ui/package-lock.json

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repositories
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: vinculum-ci

      - name: Build integration images
        run: |
          docker build -t vinculum-infra:e2e -f apps/vinculum-infra/Dockerfile .
          docker build -t vinculum-orchestrator:e2e -f apps/orchestrator/Dockerfile .

      - name: Load images into kind
        run: |
          kind load docker-image vinculum-infra:e2e --name vinculum-ci
          kind load docker-image vinculum-orchestrator:e2e --name vinculum-ci

      - name: Run integration smoke test
        run: bash hack/ci/integration-smoke.sh

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get all -n vinculum-system || true
          kubectl get events -n vinculum-system --sort-by=.metadata.creationTimestamp || true
          for pod in $(kubectl get pods -n vinculum-system -o name); do
            echo "::group::${pod}"
            kubectl describe -n vinculum-system "$pod" || true
            kubectl logs -n vinculum-system "$pod" --all-containers=true --tail=200 || true
            echo "::endgroup::"
          done

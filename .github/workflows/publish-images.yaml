name: Publish Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: vinculum-orchestrator
            dockerfile: apps/orchestrator/Dockerfile
          - image: vinculum-agent
            dockerfile: apps/vinculum-agent/Dockerfile
          - image: vinculum-infra
            dockerfile: apps/vinculum-infra/Dockerfile
          - image: vinculum-hive-ui
            dockerfile: apps/hive-ui/Dockerfile
          - image: vinculum-site
            dockerfile: apps/site/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute image metadata defaults
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Read release version from chart
        run: |
          app_version=$(awk '/^appVersion:/ { print $2; exit }' helm/vinculum/Chart.yaml)
          echo "app_version=${app_version}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.owner_lc }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.app_version }},enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
